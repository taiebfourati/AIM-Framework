# ==========================================================================
# handover_nr.ini — Simu5G NR Handover Configuration for RTP Observer
#
# 5-phase simulation aligned with the AI Management Framework evaluation:
#   Phase 1 (0-40s):   Stable — UEs stationary, clean channel
#   Phase 2 (40-60s):  Concept drift — UEs move, handover triggers
#   Phase 3a (60-65s): Subtle perturbation — background interference rises
#   Phase 3b (65-70s): Aggressive perturbation — jamming-like interference
#   Phase 4 (70-90s):  Recovery — interference subsides, UEs stabilise
#
# KPI recording: all L1/L2/L3 metrics logged for Python post-processing.
#
# Reference: 3GPP TS 38.331 (handover), 3GPP TS 38.215 (measurements)
# ==========================================================================

[General]
network = HandoverNR
sim-time-limit = 90s
warmup-period = 2s
repeat = 30
seed-set = ${repetition}

# --- Result recording ---
output-vector-file = "${resultdir}/${configname}-${iterationvarsf}#${repetition}.vec"
output-scalar-file = "${resultdir}/${configname}-${iterationvarsf}#${repetition}.sca"

# Use SQLite for easier Python integration (comment out for .vec/.sca)
# **.result-recording-modes = all
# outputvectormanager-class = "omnetpp::envir::SqliteOutputVectorManager"
# outputscalarmanager-class = "omnetpp::envir::SqliteOutputScalarManager"

# --- Channel model (3GPP Urban Macro) ---
**.channelModel.scenario = "URBAN_MACROCELL"
**.channelModel.shadowing = true
**.channelModel.nodeb_height = 25
**.channelModel.ue_height = 1.5
**.channelModel.carrierFrequency = 3.5
**.channelModel.numBands = 25

# --- NR parameters ---
*.gnb*.cellularNic.nrChannelModel[0].componentCarrierIndex = 0
*.carrierAggregation.numComponentCarriers = 1
*.carrierAggregation.componentCarrier[0].numerologyIndex = 1
*.carrierAggregation.componentCarrier[0].carrierFrequency = 3.5GHz
*.carrierAggregation.componentCarrier[0].numBands = 25

# --- gNB positions (triangular, ISD ≈ 500m) ---
*.gnb1.mobility.initialX = 300m
*.gnb1.mobility.initialY = 400m
*.gnb2.mobility.initialX = 700m
*.gnb2.mobility.initialY = 400m
*.gnb3.mobility.initialX = 500m
*.gnb3.mobility.initialY = 150m

# --- gNB cell IDs ---
*.gnb1.macCellId = 1
*.gnb1.macNodeId = 1
*.gnb2.macCellId = 2
*.gnb2.macNodeId = 2
*.gnb3.macCellId = 3
*.gnb3.macNodeId = 3

# --- Handover parameters (3GPP TS 38.331 A3 event) ---
**.cellularNic.nrPhy.enableHandover = true
**.cellularNic.nrMac.amcMode = "AUTO"
*.gnb*.cellularNic.nrPhy.handoverLatency = 50ms
**.sctp.nagleEnabled = false

# A3 event parameters
*.gnb*.cellularNic.nrPhy.hysteresis = 3dB
*.gnb*.cellularNic.nrPhy.a3Offset = 2dB
*.gnb*.cellularNic.nrPhy.timeToTrigger = 0.1s

# --- UE mobility ---
*.numUe = 10

# --- KPI signal recording (all metrics needed for RTP framework) ---
# PHY layer: RSRP, SINR
**.ue[*].cellularNic.nrPhy.**.vector-recording = true
**.ue[*].cellularNic.nrPhy.rcvdSinrDl:vector.vector-recording = true
**.ue[*].cellularNic.**.measuredRsrp:vector.vector-recording = true

# MAC layer: throughput, HARQ, CQI
**.ue[*].cellularNic.nrMac.**.vector-recording = true

# Application layer: delay, jitter, packet loss
**.ue[*].app[*].**.vector-recording = true

# Handover events
**.gnb*.cellularNic.nrPhy.handover*:vector.vector-recording = true
**.ue[*].cellularNic.nrPhy.servingCell:vector.vector-recording = true

# ========================
# Phase-specific configurations
# ========================

# --- Phase 1: Stable (UEs near gnb1, stationary) ---
[Config Stable]
extends = General
sim-time-limit = 40s

*.ue[*].mobility.typename = "StationaryMobility"
*.ue[0..4].mobility.initialX = uniform(250m, 350m)
*.ue[0..4].mobility.initialY = uniform(350m, 450m)
*.ue[5..9].mobility.initialX = uniform(280m, 320m)
*.ue[5..9].mobility.initialY = uniform(380m, 420m)

# VoIP application (low traffic, stable)
*.server.numApps = 10
*.server.app[*].typename = "UdpBasicApp"
*.server.app[*].destPort = 3000
*.server.app[*].messageLength = 40B
*.server.app[*].sendInterval = 20ms
*.ue[*].numApps = 1
*.ue[*].app[0].typename = "UdpSink"
*.ue[*].app[0].localPort = 3000

# --- Phase 2: Concept drift (UEs move towards cell edge → handover) ---
[Config ConceptDrift]
extends = General

*.ue[*].mobility.typename = "LinearMobility"
*.ue[*].mobility.speed = uniform(5mps, 15mps)
*.ue[*].mobility.angle = uniform(0deg, 360deg)
*.ue[*].mobility.initialX = uniform(200m, 800m)
*.ue[*].mobility.initialY = uniform(100m, 600m)

*.server.numApps = 10
*.server.app[*].typename = "UdpBasicApp"
*.server.app[*].destPort = 3000
*.server.app[*].messageLength = 100B
*.server.app[*].sendInterval = 10ms
*.ue[*].numApps = 1
*.ue[*].app[0].typename = "UdpSink"
*.ue[*].app[0].localPort = 3000

# --- Phase 3: Interference injection (background cells power up) ---
[Config Poisoning]
extends = ConceptDrift

# Background cells with high power to create interference
*.numBgCells = 6
*.bgCell[*].bgScheduler.isNr = true
*.bgCell[*].bgScheduler.txPower = 40
*.bgCell[*].bgScheduler.numBands = 25

# --- Full 5-phase campaign ---
[Config FullCampaign]
extends = General
sim-time-limit = 90s

# UEs start stationary, begin moving at t=40s
*.ue[*].mobility.typename = "BonnMotionMobility"
# Mobility traces would be generated by a separate script
# For simplicity, use linear mobility with speed change via scenario manager
*.ue[*].mobility.typename = "LinearMobility"
*.ue[*].mobility.speed = 0mps
*.ue[*].mobility.initialX = uniform(250m, 350m)
*.ue[*].mobility.initialY = uniform(350m, 450m)

# Application traffic
*.server.numApps = 10
*.server.app[*].typename = "UdpBasicApp"
*.server.app[*].destPort = 3000
*.server.app[*].messageLength = 100B
*.server.app[*].sendInterval = 10ms
*.ue[*].numApps = 1
*.ue[*].app[0].typename = "UdpSink"
*.ue[*].app[0].localPort = 3000

# Scenario manager for phase transitions
*.hasScenarioManager = true
